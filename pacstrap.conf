# SPDX-FileCopyrightText: no
# SPDX-License-Identifier: CC0-1.0
#
### pacstrap Module
#
# This module installs the base system and then copies files
# into the installation that will be used in the installed system
#

---
# basePackages is an array of package names to pass to pacstrap
#
basePackages:
  - base
  - base-devel
  - btrfs-progs
  - linux
  - linux-headers
  - linux-firmware
  - mkinitcpio
  - cryptsetup
  - device-mapper
  - diffutils
  - dosfstools
  - e2fsprogs
  - efibootmgr
  - exfatprogs
  - f2fs-tools
  - grub
  - inetutils
  - iptables-nft
  - jfsutils
  - less
  - lsb-release
  - lvm2
  - man-db
  - man-pages
  - mdadm
  - networkmanager
  - os-prober
  - perl
  - python
  - s-nail
  - sudo
  - sysfsutils
  - texinfo
  - usbutils
  - which
  - xfsprogs
  - core-skel-kde
  - core-wallpapers
  - core-icons
  - plasma-desktop
  - plasma-workspace
  - plasma-nm
  - plasma-pa
  - plasma-systemmonitor
  - plasma-firewall
  - kdeplasma-addons
  - dolphin
  - konsole
  - kate
  - gwenview
  - spectacle
  - ark
  - filelight
  - kcalc
  - kdeconnect
  - kde-gtk-config
  - kwallet-pam
  - sddm
  - sddm-kcm
  - qt6-wayland
  - egl-wayland
  - xdg-desktop-portal-kde

postInstallFiles:
  - "/etc/default/grub"
  - "/etc/pacman.conf"
  - "/etc/mkinitcpio.conf"
